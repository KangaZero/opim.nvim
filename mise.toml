# Project-local tool versions, managed by mise (https://mise.jdx.dev/).
# `mise install` (or auto_install on directory entry) pulls these into
# ~/.local/share/mise/installs/ and activates them only inside this repo.

[tools]
just = "latest"
# Taplo: TOML LSP + CLI used by `just check-config` to validate settings.toml
# against schema/settings.schema.json.
taplo = "latest"
# Swift toolchain is managed by swiftly (not mise) — pinned via .swift-version.
# swiftly ships the full xctoolchain bundle, which sourcekit-lsp needs for
# per-file build settings resolution. The slim CommandLineTools install
# omits _TestingInterop, so a swiftly toolchain is still required for tests.
