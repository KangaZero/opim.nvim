name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # macos-15's preinstalled Xcode ships Swift 6.2.x. Package.swift declares
      # swift-tools-version 6.3, so we install Swift 6.3 via swiftly (Apple's
      # official Swift version manager: https://www.swift.org/install/macos/swiftly/).
      - name: Install Swift 6.3 via swiftly
        run: |
          curl -fsSL -o /tmp/swiftly.pkg https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg /tmp/swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --assume-yes --quiet-shell-followup --skip-install
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          ~/.swiftly/bin/swiftly install --use 6.3

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Lint (swift format lint --strict)
        run: swift format lint --strict --recursive Sources Tests

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test
