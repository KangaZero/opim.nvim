name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # The default Xcode on macos-15 may ship an older Swift. Package.swift
      # declares swift-tools-version 6.3, so we pin to the newest stable Xcode
      # the runner has installed.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Lint (swift format lint --strict)
        run: swift format lint --strict --recursive Sources Tests

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test
